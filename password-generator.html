<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PassForge — Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="password-generator.css">
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo"><span class="logo-dot"></span> PassForge</div>
    <h1>Generate a <span>Secure</span><br>Password</h1>
  </div>

  <!-- Output -->
  <div class="output-wrap">
    <div class="output" id="output">Click generate to begin…</div>
    <button class="copy-btn" id="copyBtn" title="Copy password" onclick="copyPassword()">
      <svg id="copyIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
  </div>

  <!-- Strength -->
  <div class="strength-row">
    <div class="strength-label">Strength</div>
    <div class="strength-bars">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
      <div class="bar" id="b4"></div>
    </div>
    <div class="strength-text" id="strengthText">—</div>
  </div>

  <!-- Length -->
  <div class="section-label">Password Length</div>
  <div class="length-row">
    <input type="range" id="lengthSlider" min="4" max="64" value="16" oninput="updateLength()">
    <div class="length-val" id="lengthVal">16</div>
  </div>

  <!-- Options -->
  <div class="section-label">Character Types</div>
  <div class="options-grid">
    <div class="opt active" id="opt-lower" onclick="toggleOpt('lower')">
      <div class="opt-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#030b11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 3.5 6.5 9 1"/></svg>
      </div>
      <span class="opt-icon">a–z</span>
      <span class="opt-label">Lowercase</span>
    </div>
    <div class="opt active" id="opt-upper" onclick="toggleOpt('upper')">
      <div class="opt-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#030b11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 3.5 6.5 9 1"/></svg>
      </div>
      <span class="opt-icon">A–Z</span>
      <span class="opt-label">Uppercase</span>
    </div>
    <div class="opt active" id="opt-numbers" onclick="toggleOpt('numbers')">
      <div class="opt-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#030b11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 3.5 6.5 9 1"/></svg>
      </div>
      <span class="opt-icon">0–9</span>
      <span class="opt-label">Numbers</span>
    </div>
    <div class="opt" id="opt-symbols" onclick="toggleOpt('symbols')">
      <div class="opt-check">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none" stroke="#030b11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 3.5 6.5 9 1"/></svg>
      </div>
      <span class="opt-icon">#!@</span>
      <span class="opt-label">Symbols</span>
    </div>
  </div>

  <!-- Generate -->
  <button class="gen-btn" onclick="generate()">
    <span class="btn-inner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      Generate Password
    </span>
  </button>
  </div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script src="password-generator.js"></script>
</body>
</html>
